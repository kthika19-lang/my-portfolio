<svg viewBox="0 0 920 540" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="tokHero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4C1D95"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <marker id="tokArrow" markerWidth="9" markerHeight="9" refX="5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#b7add0"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="918" height="538" rx="16" fill="#ffffff" stroke="#e7e3ee"/>
  <rect x="1" y="1" width="918" height="6" rx="3" fill="url(#tokHero)"/>

  <text x="36" y="50" font-size="12" font-weight="700" letter-spacing="1.5" fill="#4C1D95">FOUNDATION · TOKENS</text>
  <text x="36" y="88" font-size="30" font-weight="700" fill="#141019">Token architecture</text>
  <text x="36" y="114" font-size="13" fill="#7a7484">A strict three-layer model — nothing is hardcoded past the base layer.</text>

  <!-- 3-layer flow -->
  <g>
    <!-- Card 1: Base -->
    <rect x="36" y="150" width="253" height="150" rx="12" fill="#faf9fc" stroke="#e7e3ee"/>
    <circle cx="70" cy="188" r="15" fill="#4C1D95"/>
    <text x="70" y="193" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">1</text>
    <text x="98" y="185" font-size="18" font-weight="700" fill="#141019">Base</text>
    <text x="98" y="202" font-size="10" font-weight="700" letter-spacing="1" fill="#4C1D95">PRIMITIVES</text>
    <text x="56" y="236" font-size="12" fill="#4a4553">Raw values only —</text>
    <text x="56" y="253" font-size="12" fill="#4a4553">hex, px, rem. No meaning.</text>
    <rect x="56" y="266" width="150" height="26" rx="13" fill="#ffffff" stroke="#e7e3ee"/>
    <rect x="65" y="273" width="12" height="12" rx="3" fill="#633EA5"/>
    <text x="84" y="283" font-size="12" font-family="ui-monospace,Menlo,monospace" fill="#141019">#633EA5</text>

    <!-- Card 2: Roles -->
    <rect x="333" y="150" width="253" height="150" rx="12" fill="#faf9fc" stroke="#e7e3ee"/>
    <circle cx="367" cy="188" r="15" fill="#4C1D95"/>
    <text x="367" y="193" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">2</text>
    <text x="395" y="185" font-size="18" font-weight="700" fill="#141019">Roles</text>
    <text x="395" y="202" font-size="10" font-weight="700" letter-spacing="1" fill="#4C1D95">SEMANTICS</text>
    <text x="353" y="236" font-size="12" fill="#4a4553">Gives a value intent —</text>
    <text x="353" y="253" font-size="12" fill="#4a4553">what it's for.</text>
    <rect x="353" y="266" width="180" height="26" rx="13" fill="#ffffff" stroke="#e7e3ee"/>
    <text x="366" y="283" font-size="12" font-family="ui-monospace,Menlo,monospace" fill="#4C1D95">bg.brand.bold</text>

    <!-- Card 3: Usage -->
    <rect x="630" y="150" width="253" height="150" rx="12" fill="#faf9fc" stroke="#e7e3ee"/>
    <circle cx="664" cy="188" r="15" fill="#4C1D95"/>
    <text x="664" y="193" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">3</text>
    <text x="692" y="185" font-size="18" font-weight="700" fill="#141019">Usage</text>
    <text x="692" y="202" font-size="10" font-weight="700" letter-spacing="1" fill="#4C1D95">COMPONENT TOKENS</text>
    <text x="650" y="236" font-size="12" fill="#4a4553">Binds a role to one</text>
    <text x="650" y="253" font-size="12" fill="#4a4553">place in the UI.</text>
    <rect x="650" y="266" width="200" height="26" rx="13" fill="#ffffff" stroke="#e7e3ee"/>
    <text x="663" y="283" font-size="12" font-family="ui-monospace,Menlo,monospace" fill="#4C1D95">button-primary-bg</text>

    <!-- flow arrows -->
    <line x1="296" y1="225" x2="326" y2="225" stroke="#b7add0" stroke-width="1.5" marker-end="url(#tokArrow)"/>
    <line x1="593" y1="225" x2="623" y2="225" stroke="#b7add0" stroke-width="1.5" marker-end="url(#tokArrow)"/>
  </g>

  <line x1="36" y1="332" x2="884" y2="332" stroke="#e7e3ee"/>

  <!-- resolution chain -->
  <text x="36" y="362" font-size="13" font-weight="700" fill="#141019">How one token resolves</text>
  <text x="36" y="380" font-size="12" fill="#7a7484">A component reads a usage token; it always traces back to exactly one base value.</text>

  <g font-size="10" font-weight="700" letter-spacing="0.6" fill="#7a7484">
    <text x="36" y="406">USAGE</text>
    <text x="290" y="406">ROLE</text>
    <text x="496" y="406">BASE</text>
    <text x="714" y="406">VALUE</text>
  </g>

  <g>
    <rect x="36" y="414" width="228" height="42" rx="10" fill="#141019"/>
    <text x="150" y="440" text-anchor="middle" font-size="12.5" font-family="ui-monospace,Menlo,monospace" fill="#ffffff">left-nav-lv2-icon-selected</text>

    <rect x="290" y="414" width="180" height="42" rx="10" fill="#1c1626"/>
    <text x="380" y="440" text-anchor="middle" font-size="12.5" font-family="ui-monospace,Menlo,monospace" fill="#e6def7">icon.brand.dark-800</text>

    <rect x="496" y="414" width="192" height="42" rx="10" fill="#1c1626"/>
    <text x="592" y="440" text-anchor="middle" font-size="12.5" font-family="ui-monospace,Menlo,monospace" fill="#e6def7">color.brand.dark-800</text>

    <rect x="714" y="414" width="170" height="42" rx="10" fill="#141019"/>
    <rect x="726" y="424" width="22" height="22" rx="4" fill="#4C1D95"/>
    <text x="800" y="440" text-anchor="middle" font-size="12.5" font-family="ui-monospace,Menlo,monospace" fill="#ffffff">#4C1D95</text>

    <line x1="266" y1="435" x2="288" y2="435" stroke="#b7add0" stroke-width="1.5" marker-end="url(#tokArrow)"/>
    <line x1="472" y1="435" x2="494" y2="435" stroke="#b7add0" stroke-width="1.5" marker-end="url(#tokArrow)"/>
    <line x1="690" y1="435" x2="712" y2="435" stroke="#b7add0" stroke-width="1.5" marker-end="url(#tokArrow)"/>
  </g>

  <text x="36" y="494" font-size="12.5" fill="#4a4553">An agent never invents a value — no drift is possible when every token resolves to a single source of truth.</text>
</svg>
