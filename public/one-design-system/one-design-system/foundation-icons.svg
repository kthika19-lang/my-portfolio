<svg viewBox="0 0 640 560" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="iconHero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4C1D95"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <pattern id="grid24" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ece8f4" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="1" y="1" width="638" height="558" rx="16" fill="#ffffff" stroke="#e7e3ee"/>
  <rect x="1" y="1" width="638" height="6" rx="3" fill="url(#iconHero)"/>

  <text x="32" y="52" font-size="12" font-weight="700" letter-spacing="1.5" fill="#4C1D95">FOUNDATION · ICONS</text>
  <text x="32" y="90" font-size="30" font-weight="700" fill="#141019">Icons</text>
  <text x="32" y="116" font-size="13" fill="#7a7484">200+ icons &#183; 24px grid &#183; 1.5 stroke &#183; rounded caps</text>

  <!-- Construction panel -->
  <rect x="32" y="140" width="576" height="262" rx="12" fill="#faf9fc" stroke="#e7e3ee"/>
  <svg x="48" y="152" width="330" height="238" viewBox="0 0 330 238">
    <rect width="330" height="238" fill="url(#grid24)" opacity="0.9"/>
    <!-- keyline circle + square -->
    <rect x="86" y="52" width="150" height="132" rx="22" fill="none" stroke="#D1BDED" stroke-width="1.5" stroke-dasharray="4 4"/>
    <circle cx="161" cy="118" r="86" fill="none" stroke="#D1BDED" stroke-width="1.5" stroke-dasharray="4 4"/>
    <!-- sample icon: card + magnifier -->
    <g stroke="#7C3AED" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="96" y="70" width="118" height="94" rx="14"/>
      <path d="M118 100 h44"/>
      <path d="M118 124 h60"/>
      <circle cx="196" cy="132" r="34"/>
      <path d="M196 118 v28 M182 132 h28"/>
      <path d="M220 156 l22 22"/>
    </g>
    <!-- yellow highlights -->
    <path d="M96 84 a14 14 0 0 1 14 -14" stroke="#FBBF24" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M118 124 h20" stroke="#FBBF24" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="242" cy="178" r="5.5" fill="#FBBF24"/>
  </svg>

  <!-- annotations -->
  <g font-size="12" fill="#4a4553">
    <line x1="150" y1="196" x2="404" y2="186" stroke="#c9c2d8" stroke-width="1"/>
    <circle cx="404" cy="186" r="2.5" fill="#4C1D95"/>
    <text x="414" y="184" font-weight="600" fill="#141019">Rounded corners</text>
    <text x="414" y="200" fill="#7a7484">4px radius, all shapes</text>

    <line x1="196" y1="284" x2="404" y2="248" stroke="#c9c2d8" stroke-width="1"/>
    <circle cx="404" cy="248" r="2.5" fill="#4C1D95"/>
    <text x="414" y="246" font-weight="600" fill="#141019">Stroke width</text>
    <text x="414" y="262" fill="#7a7484">1.5px, consistent weight</text>

    <line x1="290" y1="330" x2="404" y2="312" stroke="#c9c2d8" stroke-width="1"/>
    <circle cx="404" cy="312" r="2.5" fill="#4C1D95"/>
    <text x="414" y="310" font-weight="600" fill="#141019">Rounded caps</text>
    <text x="414" y="326" fill="#7a7484">22px live area, 2px padding</text>
  </g>

  <!-- finished set strip -->
  <text x="32" y="438" font-size="11" font-weight="700" letter-spacing="0.5" fill="#4a4553">THE SET</text>
  <g stroke="#4C1D95" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- search -->
    <g transform="translate(56,456)"><circle cx="9" cy="9" r="8"/><path d="M15 15 l7 7"/></g>
    <!-- chart -->
    <g transform="translate(146,456)"><path d="M2 22 V10 M11 22 V2 M20 22 V14"/></g>
    <!-- check circle -->
    <g transform="translate(236,456)"><circle cx="11" cy="11" r="10"/><path d="M6 11 l3.5 3.5 L17 7"/></g>
    <!-- gear -->
    <g transform="translate(326,456)"><circle cx="11" cy="11" r="4.5"/><path d="M11 1 v3 M11 18 v3 M1 11 h3 M18 11 h3 M4 4 l2 2 M16 16 l2 2 M18 4 l-2 2 M6 16 l-2 2"/></g>
    <!-- bell -->
    <g transform="translate(416,456)"><path d="M4 16 a8 8 0 0 1 8 -14 a8 8 0 0 1 8 14 z M9 20 a3 3 0 0 0 6 0"/></g>
    <!-- document -->
    <g transform="translate(506,456)"><path d="M4 1 h11 l5 5 v16 h-16 z M15 1 v5 h5 M8 12 h8 M8 16 h8"/></g>
  </g>

  <line x1="32" y1="500" x2="608" y2="500" stroke="#e7e3ee"/>
  <text x="32" y="528" font-size="12.5" fill="#4a4553">One grid, one stroke rule — 200+ icons that read as a single, coherent set.</text>
</svg>
