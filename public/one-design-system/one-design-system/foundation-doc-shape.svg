<svg viewBox="0 0 920 500" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="dsHero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4C1D95"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect x="1" y="1" width="918" height="498" rx="16" fill="#ffffff" stroke="#e7e3ee"/>
  <rect x="1" y="1" width="918" height="6" rx="3" fill="url(#dsHero)"/>

  <text x="36" y="50" font-size="12" font-weight="700" letter-spacing="1.5" fill="#4C1D95">PROCESS · DOCUMENTATION</text>
  <text x="36" y="88" font-size="30" font-weight="700" fill="#141019">One doc shape, every component</text>
  <text x="36" y="114" font-size="13" fill="#7a7484">The same template for all — human-readable and agent-parseable.</text>

  <!-- Left: the template outline -->
  <rect x="36" y="150" width="286" height="282" rx="12" fill="#faf9fc" stroke="#e7e3ee"/>
  <text x="56" y="180" font-size="11" font-weight="700" letter-spacing="0.8" fill="#4a4553">DOC TEMPLATE</text>
  <g font-size="12.5" fill="#4a4553">
    <circle cx="62" cy="204" r="7" fill="#4C1D95"/><path d="M59 204 l2 2 3.5 -4" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="82" y="208">Preview</text>
    <circle cx="62" cy="231" r="7" fill="#4C1D95"/><path d="M59 231 l2 2 3.5 -4" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="82" y="235">Anatomy</text>
    <circle cx="62" cy="258" r="7" fill="#4C1D95"/><path d="M59 258 l2 2 3.5 -4" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="82" y="262">Variants</text>
    <circle cx="62" cy="285" r="7" fill="#4C1D95"/><path d="M59 285 l2 2 3.5 -4" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="82" y="289">States</text>
    <circle cx="62" cy="312" r="7" fill="#4C1D95"/><path d="M59 312 l2 2 3.5 -4" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="82" y="316">Sizes</text>
    <circle cx="62" cy="339" r="7" fill="#4C1D95"/><path d="M59 339 l2 2 3.5 -4" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="82" y="343">Behavior</text>
    <circle cx="62" cy="366" r="7" fill="#4C1D95"/><path d="M59 366 l2 2 3.5 -4" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="82" y="370">Do's &amp; don'ts</text>
    <circle cx="62" cy="393" r="7" fill="#4C1D95"/><path d="M59 393 l2 2 3.5 -4" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round"/><text x="82" y="397">Accessibility notes</text>
  </g>

  <!-- Right: in practice (three columns) -->
  <rect x="346" y="150" width="538" height="282" rx="12" fill="#faf9fc" stroke="#e7e3ee"/>
  <text x="366" y="180" font-size="11" font-weight="700" letter-spacing="0.8" fill="#4a4553">IN PRACTICE</text>
  <line x1="532" y1="200" x2="532" y2="408" stroke="#e7e3ee"/>
  <line x1="698" y1="200" x2="698" y2="408" stroke="#e7e3ee"/>

  <!-- Col 1: Preview -->
  <rect x="404" y="256" width="90" height="30" rx="7" fill="#633EA5"/>
  <text x="449" y="276" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Primary</text>
  <text x="449" y="398" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#4C1D95">PREVIEW</text>

  <!-- Col 2: Anatomy -->
  <rect x="575" y="258" width="80" height="30" rx="7" fill="#ffffff" stroke="#4C1D95" stroke-width="1.5"/>
  <text x="615" y="278" text-anchor="middle" font-size="12" fill="#141019">Button</text>
  <g>
    <circle cx="571" cy="250" r="8" fill="#4C1D95"/><text x="571" y="253.5" text-anchor="middle" font-size="9" fill="#fff">1</text>
    <circle cx="615" cy="240" r="8" fill="#4C1D95"/><text x="615" y="243.5" text-anchor="middle" font-size="9" fill="#fff">2</text>
    <circle cx="659" cy="250" r="8" fill="#4C1D95"/><text x="659" y="253.5" text-anchor="middle" font-size="9" fill="#fff">3</text>
  </g>
  <text x="615" y="312" text-anchor="middle" font-size="9.5" fill="#7a7484">1 container · 2 label · 3 icon</text>
  <text x="615" y="398" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#4C1D95">ANATOMY</text>

  <!-- Col 3: Do's & don'ts -->
  <circle cx="716" cy="256" r="9" fill="none" stroke="#22a35e" stroke-width="1.6"/><path d="M712 256 l3 3 5 -6" stroke="#22a35e" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <rect x="732" y="247" width="118" height="20" rx="6" fill="#633EA5"/>
  <text x="791" y="261" text-anchor="middle" font-size="10.5" font-weight="600" fill="#ffffff">Submit grant</text>
  <circle cx="716" cy="298" r="9" fill="none" stroke="#e0475a" stroke-width="1.6"/><path d="M712 294 l8 8 M720 294 l-8 8" stroke="#e0475a" stroke-width="1.6" stroke-linecap="round"/>
  <rect x="732" y="289" width="118" height="20" rx="6" fill="#633EA5" opacity="0.5"/>
  <text x="791" y="303" text-anchor="middle" font-size="9.5" font-weight="600" fill="#ffffff">Click here for more info</text>
  <text x="791" y="398" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="0.5" fill="#4C1D95">DO'S &amp; DON'TS</text>

  <text x="36" y="470" font-size="12.5" fill="#4a4553">Documented once to a fixed template — so a person and an agent read the exact same source of truth.</text>
</svg>
